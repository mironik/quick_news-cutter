<div class="qnc-story-segment qnc-timeline" data-qnc-design-story-segment data-segment-type="izjava" data-playhead-pct="0" data-label-display="full">
  <header class="qnc-story-segment-head qnc-timeline-toolbar qnc-ui-toolbar">
    <button type="button" class="qnc-ui-button qnc-ui-button-quiet qnc-timeline-play-btn" data-timeline-play-pause title="Space — play / pause" aria-pressed="false">▶</button>
    <span class="qnc-editorial-timecode" data-timeline-timecode>00:00:00:00</span>
    <span class="qnc-ui-chip qnc-story-segment-kind" data-segment-kind-chip>Story segment · Izjava</span>
    <span class="qnc-ui-chip muted" data-segment-duration-chip>0:45</span>
  </header>

  <div class="qnc-timeline-scroll" data-timeline-scroll>
    <div class="qnc-timeline-canvas" data-timeline-canvas>
      <div class="qnc-timeline-row qnc-timeline-row--play" data-track-id="play" data-track-state="on-visible" data-play-hidden="true" aria-hidden="true">
        <div class="qnc-timeline-label is-play" data-track-id="play">
          <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle>
            <span class="qnc-timeline-name" data-track-id="play"></span>
          </button>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-ruler" data-timeline-ruler>
          <div class="qnc-timeline-ruler-scale" aria-hidden="true"></div>
        </div>
      </div>

      <div class="qnc-timeline-row" data-track-id="video" data-track-state="on-visible">
        <div class="qnc-timeline-label" data-track-id="video">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">◉</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle>
              <span class="qnc-timeline-name" data-track-id="video"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-video qnc-timeline-video--filmstrip">
          <div class="qnc-timeline-video-strip" aria-hidden="true">
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
          </div>
        </div>
      </div>

      <div class="qnc-timeline-row" data-track-id="audio-1" data-track-state="on-visible">
        <div class="qnc-timeline-label" data-track-id="audio-1">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">◉</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="audio-1"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-audio"></div>
      </div>

      <div class="qnc-timeline-row" data-track-id="audio-2" data-track-state="on-hidden">
        <div class="qnc-timeline-label" data-track-id="audio-2">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">○</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="audio-2"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-audio"></div>
      </div>

      <div class="qnc-timeline-row" data-track-id="audio-3" data-track-state="off">
        <div class="qnc-timeline-label" data-track-id="audio-3">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">—</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="audio-3"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-audio"></div>
      </div>

      <div class="qnc-timeline-row" data-track-id="audio-4" data-track-state="off">
        <div class="qnc-timeline-label" data-track-id="audio-4">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">—</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="audio-4"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-audio"></div>
      </div>
    </div>
  </div>
</div>
