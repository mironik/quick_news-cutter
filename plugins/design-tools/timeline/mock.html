<div class="qnc-timeline" data-qnc-design-timeline data-playhead-pct="0" data-label-display="full" data-axis-mode="montage_global">
  <header class="qnc-timeline-toolbar qnc-ui-toolbar">
    <button type="button" class="qnc-ui-button qnc-ui-button-quiet qnc-timeline-play-btn" data-timeline-play-pause title="Space — play / pause" aria-pressed="false">▶</button>
    <span class="qnc-editorial-timecode" data-timeline-timecode>00:00:00:00</span>
    <span class="qnc-ui-chip" data-timeline-axis-chip>Virtual timeline</span>
    <span class="qnc-ui-chip" data-timeline-profile-chip>Design lab</span>
  </header>

  <div class="qnc-timeline-scroll" data-timeline-scroll>
    <div class="qnc-timeline-canvas" data-timeline-canvas>
      <div class="qnc-timeline-row qnc-timeline-row--play" data-track-id="play" data-track-state="on-visible" data-play-hidden="true" aria-hidden="true">
        <div class="qnc-timeline-label is-play" data-track-id="play">
          <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
            <span class="qnc-timeline-name" data-track-id="play"></span>
          </button>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-ruler" data-timeline-ruler>
          <div class="qnc-timeline-ruler-scale" aria-hidden="true"></div>
        </div>
      </div>

      <div class="qnc-timeline-row" data-track-id="video" data-track-state="on-visible">
        <div class="qnc-timeline-label" data-track-id="video">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">◉</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="video"></span>
            </button>
          </div>
          <select class="qnc-ui-select qnc-timeline-video-mode" data-timeline-video-mode title="Način prikaza">
            <option value="filmstrip">Filmstrip</option>
            <option value="inout-thumbs">In–Out</option>
            <option value="poster">Početna</option>
          </select>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-video qnc-timeline-video--filmstrip">
          <div class="qnc-timeline-video-strip">
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
            <span class="qnc-timeline-tl-slot"></span>
          </div>
        </div>
      </div>

      <div class="qnc-timeline-row" data-track-id="audio-1" data-track-state="on-visible">
        <div class="qnc-timeline-label" data-track-id="audio-1">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">◉</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="audio-1"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-audio">
          <div class="qnc-timeline-audio-wave" aria-hidden="true"></div>
        </div>
      </div>

      <div class="qnc-timeline-row" data-track-id="audio-2" data-track-state="on-hidden">
        <div class="qnc-timeline-label" data-track-id="audio-2">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">○</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="audio-2"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-audio"></div>
      </div>

      <div class="qnc-timeline-row" data-track-id="audio-3" data-track-state="off">
        <div class="qnc-timeline-label" data-track-id="audio-3">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">—</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="audio-3"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-audio"></div>
      </div>

      <div class="qnc-timeline-row" data-track-id="audio-4" data-track-state="off">
        <div class="qnc-timeline-label" data-track-id="audio-4">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">—</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="audio-4"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-audio"></div>
      </div>

      <div class="qnc-timeline-row" data-track-id="stabilization" data-track-state="off">
        <div class="qnc-timeline-label" data-track-id="stabilization">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">—</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="stabilization"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-stabilization">
          <span class="qnc-timeline-stab-segment" data-timeline-item="stab" data-track-id="stabilization" data-item-id="s1" tabindex="-1"></span>
        </div>
      </div>

      <div class="qnc-timeline-row" data-track-id="transcript" data-track-state="off">
        <div class="qnc-timeline-label" data-track-id="transcript">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">—</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="transcript"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-transcript">
          <span class="qnc-editorial-transcript-line" data-timeline-item="transcript" data-track-id="transcript" data-item-id="t1" tabindex="-1">Prvi segment transkripta …</span>
          <span class="qnc-editorial-transcript-line" data-timeline-item="transcript" data-track-id="transcript" data-item-id="t2" tabindex="-1">Drugi segment …</span>
        </div>
      </div>

      <div class="qnc-timeline-row" data-track-id="inout" data-track-state="on-visible">
        <div class="qnc-timeline-label" data-track-id="inout">
          <div class="qnc-timeline-label-main">
            <span class="qnc-timeline-track-state" data-timeline-track-state aria-hidden="true">◉</span>
            <button type="button" class="qnc-timeline-label-cycle" data-timeline-label-cycle title="Klik: tekst → oznaka → ikona">
              <span class="qnc-timeline-name" data-track-id="inout"></span>
            </button>
          </div>
        </div>
        <div class="qnc-timeline-lane qnc-timeline-inout"></div>
      </div>

      <div class="qnc-timeline-editorial-overlay" data-timeline-editorial>
        <div class="qnc-timeline-editorial-layer qnc-timeline-editorial-layer--segments" data-editorial-layer="segments"></div>
        <div class="qnc-timeline-editorial-layer qnc-timeline-editorial-layer--slots" data-editorial-layer="slots"></div>
        <div class="qnc-timeline-editorial-layer qnc-timeline-editorial-layer--virtual-clips" data-editorial-layer="virtual_clips"></div>
        <div class="qnc-timeline-editorial-layer qnc-timeline-editorial-layer--markers" data-editorial-layer="markers"></div>
        <div class="qnc-timeline-clip-range-dim" data-timeline-clip-range-dim hidden></div>
      </div>
    </div>
  </div>
</div>
