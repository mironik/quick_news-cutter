<section class="qnc-component story-timeline qnc-editorial-story-segment" data-qnc-panel="story-segment-timeline" aria-label="Story">
  <div class="story-timeline-top">
    <div class="story-type-row qnc-ui-toolbar" data-qnc-ref="type-select">
      <button type="button" class="qnc-ui-button qnc-ui-button-quiet story-filter-btn story-filter-text active" data-action="add-tonovi" data-type="tonovi">TONOVI</button>
      <button type="button" class="qnc-ui-button qnc-ui-button-quiet story-filter-btn story-filter-text" data-action="add-offovi" data-type="offovi">OFFOVI</button>
      <button type="button" class="qnc-ui-button qnc-ui-button-quiet story-filter-btn story-filter-text story-overwrite-btn" data-action="overwrite" title="Pokrivanje u odabrani odsječak (F10)">OVERWRITE</button>
      <button type="button" class="qnc-ui-button qnc-ui-button-quiet story-filter-btn story-filter-text" data-action="test">TEST</button>
      <button type="button" class="qnc-ui-button qnc-ui-button-primary story-filter-btn story-filter-text story-commit-btn" data-action="commit">GOTOVO</button>
    </div>
  </div>
  <div class="story-board" data-qnc-ref="board" data-qnc-slot="segment-items"></div>
</section>
