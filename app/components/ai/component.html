<section class="qnc-ai-settings" data-qnc-panel="ai-settings">
  <div class="qnc-ai-options">
    <label class="qnc-ui-checkbox qnc-ai-option">
      <input type="checkbox" data-qnc-bind="ai.enabled" />
      <span>AI analiza kadrova i virtualni kadrovi</span>
    </label>
    <label class="qnc-ui-checkbox qnc-ai-option">
      <input type="checkbox" data-qnc-bind="ai.coverage_suggestions" />
      <span>Coverage suggestions</span>
    </label>
    <label class="qnc-ui-checkbox qnc-ai-option">
      <input type="checkbox" data-qnc-bind="ai.transcription_enabled" />
      <span>Transkripcija dostupna u Media tabu</span>
    </label>
  </div>
</section>
