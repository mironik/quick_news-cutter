<section class="tab-panel qnc-shell-plugin-tab story-panel" data-qnc-panel="shell-plugin-tab">
  <div class="qnc-shell-plugin-tab-body" data-qnc-slot="content">
    <section class="qnc-story-workspace" data-qnc-panel="story-tab-layout">
      <header class="qnc-story-head">
        <h2 class="qnc-story-title">Story</h2>
        <p class="qnc-story-subtitle muted">Montaža — dijelovi iz SQLite</p>
      </header>
      <dl class="qnc-story-stats">
        <div class="qnc-story-stat">
          <dt>Dijelova</dt>
          <dd data-qnc-slot="part-count">0</dd>
        </div>
        <div class="qnc-story-stat">
          <dt>Trajanje</dt>
          <dd data-qnc-slot="duration-sec">0</dd>
        </div>
        <div class="qnc-story-stat">
          <dt>Projekt</dt>
          <dd class="qnc-story-mono" data-qnc-slot="project-id">—</dd>
        </div>
      </dl>
      <div data-qnc-component="story-toolbar"></div>
      <div class="qnc-story-main">
        <div data-qnc-component="story-parts-list"></div>
        <div data-qnc-component="story-part-editor"></div>
      </div>
      <div class="qnc-story-markers-row">
        <div data-qnc-component="story-markers-list"></div>
        <div data-qnc-component="story-marker-slots-list"></div>
      </div>
      <p class="qnc-story-note muted" data-qnc-slot="status-note"></p>
    </section>
  </div>
</section>
