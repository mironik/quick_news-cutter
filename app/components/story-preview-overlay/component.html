<section class="qnc-component story-play-overlay" data-qnc-panel="story-preview-overlay" data-qnc-ref="play-overlay" hidden>
  <div class="story-play-panel" role="region" aria-label="Story preview">
    <button type="button" class="qnc-ui-button qnc-ui-button-quiet story-play-close" data-action="preview-close" title="Zatvori">×</button>
    <div class="story-play-video-wrap">
      <video class="story-play-video" data-qnc-ref="overlay-player" preload="auto" controls playsinline></video>
      <div class="story-play-off-blank" data-qnc-ref="play-off-blank" hidden>Off</div>
    </div>
    <div class="story-play-label muted" data-qnc-slot="preview-label">—</div>
  </div>
</section>
