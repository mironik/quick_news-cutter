<section class="qnc-story-cover-editor" data-qnc-panel="story-cover-editor">
  <p class="qnc-story-cover-editor-empty muted" data-qnc-slot="empty">Odaberi pokrivanje za uređivanje.</p>
  <form class="qnc-story-cover-editor-form" data-qnc-slot="form" hidden>
    <label class="qnc-story-cover-field">
      <span>Naslov</span>
      <input type="text" data-field="title" autocomplete="off" />
    </label>
    <label class="qnc-story-cover-field">
      <span>Bilješka</span>
      <textarea data-field="note" rows="3"></textarea>
    </label>
    <div class="qnc-story-cover-editor-actions">
      <button type="button" data-action="save">Spremi</button>
      <button type="button" data-action="delete">Obriši</button>
    </div>
  </form>
</section>
